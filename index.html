<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fresko Payment Follow-up</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#005F73">
<meta name="description" content="Fresko — Payment Follow-up & Collections System">

<!-- PWA manifest -->
<link rel="manifest" href="./manifest.json">

<!-- Icons -->
<link rel="icon" href="./favicon-32.png" type="image/png">
<link rel="apple-touch-icon" href="./icon-180.png">

<!-- iOS standalone support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fresko Portal">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    width: 100%;
    background: #005F73;
    overflow: hidden;
    font-family: 'Segoe UI', Roboto, Arial, sans-serif;
  }
  #frame {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
    background: #F8FAFC;
  }
  #splash {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: linear-gradient(160deg, #005F73 0%, #0E7C86 55%, #8BC53F 140%);
    z-index: 10;
    transition: opacity .35s ease;
  }
  #splash img {
    width: 88px;
    height: 88px;
    border-radius: 22px;
    background: #fff;
    padding: 10px;
    box-shadow: 0 10px 28px rgba(0,0,0,.25);
  }
  #splash .title {
    color: #fff;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: .01em;
  }
  #splash .sub {
    color: rgba(255,255,255,.75);
    font-size: 12.5px;
  }
  .spinner {
    width: 26px;
    height: 26px;
    border: 3px solid rgba(255,255,255,.25);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #retryBox {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  #retryBox button {
    background: #fff;
    color: #0E7C86;
    border: none;
    padding: 10px 22px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }
  #retryBox a {
    color: rgba(255,255,255,.85);
    font-size: 12px;
    text-decoration: underline;
  }

  #offlineBanner {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: #C0152A;
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    text-align: center;
    padding: 6px 10px;
    z-index: 20;
    display: none;
  }
</style>
</head>
<body>

  <div id="offlineBanner">No internet connection — reconnect to use the app</div>

  <div id="splash">
    <img src="https://fresko.co.in/wp-content/uploads/2025/08/Untitled-design-21.png" alt="Fresko">
    <div class="spinner" id="spinner"></div>
    <div class="title">Fresko Payment Follow-up</div>
    <div class="sub" id="splashSub">Loading your workspace…</div>

    <div id="retryBox">
      <div class="sub">Taking longer than usual</div>
      <button id="retryBtn">Retry</button>
      <a id="openInBrowserLink" target="_blank" rel="noopener">Open in browser instead</a>
    </div>
  </div>

  <iframe id="frame" title="Fresko Payment Follow-up" allow="clipboard-read; clipboard-write"></iframe>

  <script src="./app.js"></script>
</body>
</html>
